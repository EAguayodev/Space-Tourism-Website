<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <title>Frontend Mentor | Space tourism website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bellefair&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/input.css">
  <link rel="stylesheet" href="src/output.css">
  <script src="js/script.js" defer></script>
</head>
<body
  class="container mx-auto bg-[url('../assets/crew/background-crew-desktop.jpg')] bg-cover bg-no-repeat font-family-bellefair max-lg:bg-[url('../assets/crew/background-crew-tablet.jpg')] max-md:bg-[url('../assets/crew/background-crew-mobile.jpg')]">
  <header class="container">
    <nav aria-label="Primary Navigation">
      <div class="flex justify-around items-center relative top-3">
        <div class="max-sm:w-full max-sm:gap-10 max-sm:flex max-sm:justify-around max-sm:items-center">
          <a href="index.html" aria-label="Space Tourism Home" target="_self">
            <img src="assets/shared/logo.svg" alt="Space Tourism Logo">
          </a>
          <button class="hidden mobile-btn max-sm:block cursor-pointer" aria-label="Toggle Menu" aria-expanded="false" type="button">
            <img class="icon-hamburger" src="assets/shared/icon-hamburger.svg" alt="Menu">
            <img class="icon-close hidden max-sm:relative max-sm:z-50" src="assets/shared/icon-close.svg" alt="Menu">
          </button>
        </div>
        <div class="bg-gray-400 w-2xl h-px max-lg:hidden"></div>
        <div
          class="menu-list backdrop-blur-2xl py-8 px-0 max-sm:absolute max-sm:-top-3 max-sm:right-0 max-sm:bg-[rgba(0,0,0,0.5)] max-sm:w-63.5 max-sm:h-220 max-sm:z-40">
          <ul
            class="menu-nav flex space-x-8 text-white uppercase gap-5 max-sm:flex-col max-sm:gap-10 max-sm:px-9 max-sm:py-16">
            <li>
              <a class="border-b-4 border-transparent pb-7.5 transition-colors duration-300 hover:border-gray-300"
                href="index.html"><span class="font-bold">00</span> Home</a>
            </li>
            <li>
              <a class="border-b-4 border-transparent  pb-7.5 transition-colors duration-300 hover:border-gray-300"
                href="destination-moon.html"><span class="font-bold">01</span> Destination</a>
            </li>
            <li aria-current="page" class="max-sm:w-full max-sm:border-r-2 max-sm:border-b-0">
              <a class="border-b-4 pb-7.5 border-current transition-colors duration-300 max-sm:border-b-0 "
                href="crew-commander.html"><span class="font-bold">02</span> Crew</a>
            </li>
            <li>
              <a class="border-b-4 border-transparent pb-7.5 transition-colors duration-300 hover:border-gray-300"
                href="technology-vehicle.html"><span class="font-bold">03</span> Technology</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main>
    <div class="container mx-auto flex justify-center items-center mt-40">
      <div class="flex justify-center flex-col max-lg:flex max-lg:flex-col max-lg:justify-center max-lg:items-center">
        <h1 class="text-[1.75rem] text-white max-sm:text-[1rem]"><span class="text-gray-400 font-bold">02</span> MEET
          YOUR CREW</h1>
        <div
          class="flex justify-around items-center gap-12 max-lg:flex-col max-lg:justify-center max-lg:items-center mt-20">
          <div class="max-lg:flex max-lg:flex-col max-lg:justify-center max-lg:items-center">
            <div class="max-lg:flex max-lg:flex-col max-lg:items-center">
              <p
                class="crew-title content-transition text-[2rem] text-gray-400 mb-5 max-lg:text-center max-lg:text-[1.5rem] max-sm:text-[1.125rem]">
                COMMANDER</p>
              <h2
                class="crew-member content-transition text-[3.5rem] text-white mb-8 max-lg:text-5xl max-lg:text-center max-sm:text-[1.5rem]">
                DOUGLAS HURLEY
              </h2>

              <p
                class="crew-description content-transition text-blue-300 w-120 text-[1.125rem] max-lg:text-center max-lg:text-[1rem] max-sm:text-[0.875rem] max-sm:w-[17.438rem]">
                Douglas Gerald Hurley is an American engineer,
                former Marine Corps
                pilot
                and former NASA astronaut. He launched into space for the third time as
                commander of Crew Dragon Demo-2.</p>
            </div>
            <div class="flex gap-8 mt-8">
              <div tabindex="0" class="crew-btn bg-white w-2.5 h-1 mt-8 rounded-4xl py-2 px-2 cursor-pointer">
              </div>
              <div tabindex="0"
                class="crew-btn bg-gray-600 hover:bg-gray-400 w-2.5 h-1 mt-8 rounded-4xl py-2 px-2 cursor-pointer">
              </div>
              <div tabindex="0"
                class="crew-btn bg-gray-600 hover:bg-gray-400 w-2.5 h-1 mt-8 rounded-4xl py-2 px-2 cursor-pointer">
              </div>
              <div tabindex="0"
                class="crew-btn bg-gray-600 hover:bg-gray-400 w-2.5 h-1 mt-8 rounded-4xl py-2 px-2 cursor-pointer">
              </div>
            </div>
          </div>
          <div>
            <img class="crew-image content-transition max-xl:w-[128.5] max-sm:w-[271.24px]"
              src="assets/crew/image-douglas-hurley.webp" alt="Douglas Hurley Image">
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
